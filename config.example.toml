# luwu configuration example
# ────────────────────────────────────────────────────────────
# Copy this file to ~/.luwu/config.toml and fill in your API keys.
# Comment out the providers you don't use, then set
# `[default] provider = "<key name>"` to pick the active one.
#
# ╔══════════════════════════════════════════════════════════════╗
# ║ Provider-key naming convention:                              ║
# ║   • Key name "anthropic"  → uses AnthropicProvider          ║
# ║     (Anthropic Messages API format)                           ║
# ║   • Any other key name    → uses OpenAiProvider             ║
# ║     (OpenAI Chat Completions format)                         ║
# ║ This is how you route to providers that expose one of these  ║
# ║ two protocols.                                               ║
# ╚══════════════════════════════════════════════════════════════╝
#
# ╔══════════════════════════════════════════════════════════════╗
# ║ GLM / Zhipu quota is determined by the base_url, NOT the    ║
# ║ tool identity. Pick the right URL for what you want:         ║
# ║                                                               ║
# ║   Standard API (按量付费):                                    ║
# ║     OpenAI protocol  → .../api/paas/v4/                       ║
# ║     Anthropic proto  → .../api/anthropic  (key 决定套餐)     ║
# ║                                                               ║
# ║   Coding Plan (订阅制 ¥49-240/月):                           ║
# ║     OpenAI protocol  → .../api/coding/paas/v4                 ║
# ║     Anthropic proto  → .../api/anthropic  (key 决定套餐)     ║
# ║                                                               ║
# ║ 国内 (open.bigmodel.cn) 和 海外 (api.z.ai) 端点结构相同，     ║
# ║ API Key 不互通。详见智谱 FAQ:                                 ║
# ║   https://docs.bigmodel.cn/cn/coding-plan/faq                  ║
# ╚══════════════════════════════════════════════════════════════╝
# ────────────────────────────────────────────────────────────

# Default provider & model (used when no provider is specified at request time).
[default]
provider = "anthropic"             # 必须叫 "anthropic" 才会用 AnthropicProvider（GLM Coding Plan + Anthropic 协议）
model    = "glm-4.7"               # optional default model

# ── GLM Coding Plan · Anthropic 协议 (推荐) ─────────────────
# 这就是 Claude Code 的官方配置方式（faq "Claude Code 中 baseurl"）。
# Coding Plan key + 这个 URL → 走 Coding Plan 套餐额度，按 Anthropic 协议。
# 模型：GLM-5.2 / GLM-5-Turbo / GLM-4.7 / GLM-4.5-Air
# key 必须叫 "anthropic" 才会用 AnthropicProvider。
[providers.anthropic]
api_key  = "你的 Coding Plan API Key"
base_url = "https://open.bigmodel.cn/api/anthropic"
model    = "glm-4.7"

# ── GLM Coding Plan · OpenAI 协议 ────────────────────────────
# Coding Plan key + 这个 URL → 走 Coding Plan 套餐额度，按 OpenAI 协议。
# 协议不同但额度相同。Cherry Studio 用的是这个（带尾斜杠版本）。
# 模型：同上。
[providers.glm-coding]
api_key  = "你的 Coding Plan API Key"
base_url = "https://open.bigmodel.cn/api/coding/paas/v4"
model    = "glm-4.7"

# ── GLM Standard API · Anthropic 协议 ────────────────────────
# Standard API key（按量付费）+ 这个 URL → 走按量扣费。
# 注意：与上面 "anthropic" 同 URL，**用 Standard API key 替换即切换**。
[providers.glm-std-anthropic]
api_key  = "你的 Standard API Key"
base_url = "https://open.bigmodel.cn/api/anthropic"
model    = "glm-4.7"
# 因为 provider key 不能叫 "anthropic"（会被 Coding Plan 那个占用），
# 实际用的时候需要通过请求参数临时指定：
#   POST /v1/chat/completions  body: {"provider": "glm-std-anthropic", ...}
# 或者改用 OpenAI 协议的 Standard API（见下）。

# ── GLM Standard API · OpenAI 协议 ───────────────────────────
# 按量付费，OpenAI 协议。任何非 "anthropic" 的 key 都会用 OpenAiProvider。
[providers.glm]
api_key  = "你的 Standard API Key"
base_url = "https://open.bigmodel.cn/api/paas/v4/"
model    = "glm-4.7"

# ── Z.ai · 海外版 Coding Plan · Anthropic 协议 ───────────────
# Z.AI 是智谱海外平台，API Key 与国内版不互通。
# 海外版 Coding Plan 同样支持 Anthropic 协议。
[providers.zai-coding-anthropic]
api_key  = "你的 Z.AI Coding Plan Key"
base_url = "https://api.z.ai/api/anthropic"
model    = "glm-4.7"
# 注意：provider key 不能叫 "anthropic"（已被上面的 GLM Coding Plan 占用）。
# 临时切换：在请求里带 "provider": "zai-coding-anthropic"。

# ── Z.ai · 海外版 Coding Plan · OpenAI 协议 ──────────────────
[providers.zai-coding]
api_key  = "你的 Z.AI Coding Plan Key"
base_url = "https://api.z.ai/api/coding/paas/v4"
model    = "glm-4.7"

# ── Z.ai · 海外版 Standard API · OpenAI 协议 ────────────────
[providers.zai]
api_key  = "你的 Z.AI Standard API Key"
base_url = "https://api.z.ai/api/paas/v4/"
model    = "glm-4.5"

# ── DeepSeek ────────────────────────────────────────────────
# V4 thinking mode: requires `reasoning_content` to be echoed
# back across multi-turn tool calls — luwu handles this (commit 311d7e1).
# Cache fields (flat): prompt_cache_hit_tokens / prompt_cache_miss_tokens.
# luwu 的 TUI 状态栏会自动显示 "⚡ XX% cached" 徽章。
[providers.deepseek]
api_key  = "sk-..."
base_url = "https://api.deepseek.com/v1"
model    = "deepseek-chat"
# temperature = 0.7      # optional
# max_tokens  = 8192     # optional

# ── OpenAI 官方 ────────────────────────────────────────────
[providers.openai]
api_key  = "sk-..."
base_url = "https://api.openai.com/v1"
model    = "gpt-4o"

# ── Anthropic 官方 ──────────────────────────────────────────
# 注意：key 叫 "anthropic" 才会用 AnthropicProvider，但这跟 GLM Coding
# Plan 的 "anthropic" 冲突。Workaround：把这个改名（如 "anthropic-official"），
# 然后在请求里临时指定 provider。
# 真正的解决需要等 create_provider 升级（plan-tree 里有 track）。
[providers.anthropic-official]
api_key  = "sk-ant-..."
base_url = "https://api.anthropic.com"
model    = "claude-sonnet-4-5"

# ────────────────────────────────────────────────────────────
# Logging
# ────────────────────────────────────────────────────────────
[logging]
level  = "info"        # trace|debug|info|warn|error
format = "pretty"      # pretty|json
# file   = "/tmp/luwu.log"  # optional: daily-rotated file output
#                         # 集成模式（单二进制）下默认写到 ~/.luwu/logs/luwu.log
